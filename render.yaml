services:
  - type: web
    name: lichnosty-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lichnosty-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lichnosty-redis
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: NEXT_PUBLIC_URL
        value: https://lichnosty.onrender.com
      - key: SITE_NAME
        value: Личности
      - key: CRON_SECRET
        generateValue: true
      - key: REVALIDATE_SECRET
        generateValue: true

  - type: worker
    name: lichnosty-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.worker
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lichnosty-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lichnosty-redis
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat

  - type: cron
    name: lichnosty-cron-populate
    runtime: node
    schedule: "0 1 * * *"
    buildCommand: npm install
    startCommand: "node -e \"require('https').get(process.env.NEXT_PUBLIC_URL + '/api/cron/populate-trends', { headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } }, r => r.on('data', d => process.stdout.write(d)))\""
    envVars:
      - key: NEXT_PUBLIC_URL
        value: https://lichnosty.onrender.com
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: lichnosty-cron-daily
    runtime: node
    schedule: "0 2 * * *"
    buildCommand: npm install
    startCommand: node scripts/cron-daily.js
    envVars:
      - key: NEXT_PUBLIC_URL
        value: https://lichnosty.onrender.com
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: lichnosty-cron-factcheck
    runtime: node
    schedule: "0 4 * * *"
    buildCommand: npm install
    startCommand: "node -e \"require('https').get(process.env.NEXT_PUBLIC_URL + '/api/cron/fact-check?limit=5', { headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } }, r => r.on('data', d => process.stdout.write(d)))\""
    envVars:
      - key: NEXT_PUBLIC_URL
        value: https://lichnosty.onrender.com
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: lichnosty-cron-stale
    runtime: node
    schedule: "0 3 * * 0"
    buildCommand: npm install
    startCommand: "node -e \"require('https').get(process.env.NEXT_PUBLIC_URL + '/api/cron/update-stale', { headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } }, r => r.on('data', d => process.stdout.write(d)))\""
    envVars:
      - key: NEXT_PUBLIC_URL
        value: https://lichnosty.onrender.com
      - key: CRON_SECRET
        sync: false

  - type: redis
    name: lichnosty-redis
    plan: free
    ipAllowList: []

databases:
  - name: lichnosty-db
    plan: free
    databaseName: lichnosty
    user: lichnosty
